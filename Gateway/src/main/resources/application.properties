spring.application.name=Gateway
server.port=8094

#Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

#Gateway-DEBUG
logging.level.org.springframework.cloud.gateway=DEBUG

#Enrutamientos

#Rutas de Asistencia
spring.cloud.gateway.server.webflux.routes[0].id=Asistencia
spring.cloud.gateway.server.webflux.routes[0].uri=lb://Asistencia
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/v1/asistencias/**
#Rutas de Clase
spring.cloud.gateway.server.webflux.routes[1].id=clase
spring.cloud.gateway.server.webflux.routes[1].uri=lb://clase
